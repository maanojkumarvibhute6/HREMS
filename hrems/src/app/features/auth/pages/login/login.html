<form [formGroup]="loginFormGroup" (ngSubmit)="onFormSubmit()">
  <div class="auth-layout-type">
    <div class="users-logo">
      <i class="pi pi-users"></i>
    </div>
    <h1 class="auth-title">EMS Login</h1>
    <h1 class="auth-subtitle">A Complete HR Employee Management System</h1>
  </div>
  <div class="auth-body">
    <app-input-field
      [enableIcon]="true"
      [inputTextField]="true"
      [controlName]="loginFormGroup.controls.email"
      [formcontrolName]="'email'"
      inputIcon="pi pi-user"
      inputType="email"
      labelName="Email"
      [fieldlabels]="fieldlabels"
    ></app-input-field>

    <app-input-field
      [enableIcon]="true"
      [inputTextField]="true"
      [controlName]="loginFormGroup.controls.password"
      [formcontrolName]="'password'"
      inputIcon="pi pi-eye"
      inputType="password"
      labelName="Password"
      [fieldlabels]="fieldlabels"
    ></app-input-field>

    <p class="info-text">
      Forgot your password? <a class="cursor-pointer" (click)="redirect()">Click here </a>
    </p>
    
  </div>
  <div class="auth-footer">
    <button
      pButton
      [fluid]="true"
      size="large"
      type="submit"
      [loading]="isLoading()"
      [disabled]="isLoading()"
    >
      <span pButtonLabel>Submit</span>
    </button>
  </div>
</form>
