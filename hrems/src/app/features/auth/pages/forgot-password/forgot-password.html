<form [formGroup]="forgotPasswordFormGroup" (ngSubmit)="onFormSubmit()">
  <div class="auth-layout-type">
    <div class="users-logo">
      <i class="pi pi-users"></i>
    </div>
    <h1 class="auth-title">EMS Forgot Password</h1>
    <h1 class="auth-subtitle">Reset Your Password</h1>
  </div>
  <div class="auth-body">
    <div class="layout-input-field">
      <app-input-field
        [enableIcon]="true"
        [enableInputText]="true"
        [controlName]="forgotPasswordFormGroup.controls.password"
        [formcontrolName]="'password'"
        inputIcon="pi pi-eye"
        inputType="password"
        labelName="Password"
        [fieldlabels]="fieldlabels"
      ></app-input-field>
    </div>
    <div class="layout-input-field">
      <app-input-field
        [enableIcon]="true"
        [enableInputText]="true"
        [controlName]="forgotPasswordFormGroup.controls.confirmPassword"
        [formcontrolName]="'confirmPassword'"
        inputIcon="pi pi-eye"
        inputType="password"
        labelName="Confirm Password"
        [fieldlabels]="fieldlabels"
      ></app-input-field>
    </div>
    <p class="info-text">
      Remember your password? <a class="cursor-pointer" (click)="redirectToLogin()">Click here </a> Back to login page.
    </p>
  </div>
  <div class="auth-footer">
    <button pButton [fluid]="true" size="large" type="submit" [loading]="isLoading()" [disabled]="isLoading()">
      <span pButtonLabel>Submit</span>
    </button>
  </div>
</form>
