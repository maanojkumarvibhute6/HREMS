<form [formGroup]="pageFormFroup" (ngSubmit)="onFormSubmit()">
  <div class="employee-profile-container">
    <p-card class="mt-4">
      <ng-template #title>
        <div class="page-info">
          <span class="page-subtitle">Profile Creation</span>
        </div>
      </ng-template>
      <ng-template #content>
        <div class="row">
          <div class="col-sm-12 col-md-5 employee-profile-id-card">
            <img src="../../../../../assets/images/logo_transparent.png" alt="" srcset="" />
          </div>
          <div class="col-sm-12 col-md-7">
            <div class="row">
              <div class="col-sm-12">
                
              </div>
              <div class="col-sm-12 col-md-6">
                
              </div>
              <div class="col-sm-12 col-md-6">
                
              </div>
            </div>
          </div>
        </div>
      </ng-template>

    </p-card>

    <div class="text-center">
      <button class="mt-4" pButton size="large" type="submit">
        <span pButtonLabel>Submit</span>
      </button>
    </div>

  </div>

</form>
